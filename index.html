<!DOCTYPE html>
<html>
<head>
<title>AWS AI Chatbot</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="chat-container">

<div class="header">
AWS Serverless AI Chatbot
</div>

<div id="response" class="chat-box">
<div class="bot">Hello Ask me something about AI, Cloud, or AWS.</div>
</div>

<div class="input-area">
<input id="question" placeholder="Type your question..." />
<button onclick="ask()">Send</button>
</div>

</div>

<script src="script.js"></script>

</body>
</html>
